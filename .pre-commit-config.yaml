repos:
  - repo: local
    hooks:
      - id: format-python
        name: Format Python (black, then docformatter where it doesn't conflict with black)
        description: >
          Runs black, then docformatter on top of it, keeping docformatter's
          docstring changes only when a subsequent black pass leaves them
          unchanged. See scripts/format_docstrings.py for why: docformatter
          can miscount blank lines after an attribute docstring that
          precedes a decorated top-level class/function, which would
          otherwise oscillate forever against black.
        entry: python scripts/format_docstrings.py
        language: python
        additional_dependencies: ["black==25.11.0", "docformatter==1.7.8", "typing_extensions", "tqdm"]
        files: \.py$
        exclude: (?x)^(.*/ormatic_interface\.py)$
